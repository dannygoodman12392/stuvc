<!DOCTYPE html>
<html lang="en">
  <head>

    <!-- Primary SEO -->
    <title>Stu — AI-Powered Founder Sourcing OS for Venture Capital</title>
    <meta name="description" content="Stu is the operating system for VC deal sourcing. Automatically discover pre-seed founders, triage them through customizable pipelines, and make faster investment decisions with AI-driven signal." />

    <link rel="canonical" href="https://www.stu.vc" />

    <!-- Open Graph / Facebook -->

    <meta property="og:url" content="https://www.stu.vc" />
    <meta property="og:title" content="Stu — AI-Powered Founder Sourcing OS" />
    <meta property="og:description" content="Automatically discover pre-seed founders, triage them through customizable pipelines, and make faster investment decisions with AI-driven signal." />

    <meta property="og:site_name" content="Stu" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Stu — AI-Powered Founder Sourcing OS" />
    <meta name="twitter:description" content="Automatically discover pre-seed founders, triage them through customizable pipelines, and make faster investment decisions with AI-driven signal." />
    <meta name="twitter:image" content="https://www.stu.vc/stu-logo-convergence.svg" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Stu",
      "description": "AI-powered founder sourcing operating system for venture capital firms. Automated deal discovery, customizable pipelines, and multi-agent assessment.",

      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Stu"
      }
    }
    </script>
